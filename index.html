<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Neon Solver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff00de;
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #e2e8f0;
        }

        .neon-border {
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2), inset 0 0 5px rgba(0, 242, 255, 0.1);
        }

        .neon-text-blue { color: var(--neon-blue); text-shadow: 0 0 8px rgba(0, 242, 255, 0.5); }
        .neon-text-purple { color: var(--neon-purple); text-shadow: 0 0 8px rgba(188, 19, 254, 0.5); }

        .matrix-input, .vector-input {
            width: 65px;
            height: 45px;
            text-align: center;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid #334155;
            border-radius: 4px;
            color: var(--neon-blue);
            font-family: 'Fira Code', monospace;
            transition: all 0.3s;
        }

        .matrix-input:focus, .vector-input:focus {
            outline: none;
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            background: rgba(30, 41, 59, 1);
        }

        .btn-neon {
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-neon:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-blue); }
    </style>
</head>
<body class="p-4 min-h-screen">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold neon-text-blue mb-2 tracking-tighter">MATRIX NEON SOLVER</h1>
            <p class="text-slate-400 font-mono text-sm uppercase tracking-widest">Advanced Matrix Factorization & System Resolver</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Sidebar Config -->
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-panel p-6 rounded-2xl neon-border">
                    <h2 class="text-sm font-bold neon-text-purple mb-4 uppercase">System Config</h2>
                    
                    <div class="mb-4">
                        <label class="block text-xs text-slate-400 mb-2 uppercase">Dimension</label>
                        <select id="matrixSize" class="w-full p-2 bg-slate-800 border border-slate-700 rounded text-blue-400" onchange="generateMatrixInput()">
                            <option value="2">2 x 2</option>
                            <option value="3" selected>3 x 3</option>
                            <option value="4">4 x 4</option>
                            <option value="5">5 x 5</option>
                            <option value="6">6 x 6</option>
                        </select>
                    </div>

                    <div class="mb-6">
                        <label class="block text-xs text-slate-400 mb-2 uppercase">Factorization</label>
                        <select id="method" class="w-full p-2 bg-slate-800 border border-slate-700 rounded text-blue-400">
                            <option value="doolittle">Doolittle (Lii = 1)</option>
                            <option value="crout">Crout (Uii = 1)</option>
                            <option value="cholesky">Cholesky (A = LLᵀ)</option>
                        </select>
                    </div>

                    <button onclick="calculate()" class="w-full btn-neon py-3 rounded-lg mb-3">
                        Execute Solver
                    </button>
                    
                    <button onclick="clearMatrix()" class="w-full text-xs text-slate-500 hover:text-white transition">
                        Reset Memory
                    </button>
                </div>
            </div>

            <!-- Matrix Input Area -->
            <div class="lg:col-span-3">
                <div class="glass-panel p-8 rounded-2xl border border-slate-800">
                    <div class="flex flex-col md:flex-row items-center justify-around gap-8">
                        <div>
                            <h2 class="text-center text-xs font-bold text-slate-500 mb-4 uppercase">Matrix [A]</h2>
                            <div id="matrixContainer" class="flex flex-col space-y-2"></div>
                        </div>
                        <div class="hidden md:block text-3xl text-slate-700">×</div>
                        <div>
                            <h2 class="text-center text-xs font-bold text-slate-500 mb-4 uppercase">Vector {b}</h2>
                            <div id="vectorContainer" class="flex flex-col space-y-2"></div>
                        </div>
                    </div>
                    <div id="messageBox" class="hidden mt-6 p-4 rounded bg-red-900/30 border border-red-500 text-red-400 text-xs"></div>
                </div>
            </div>
        </div>

        <!-- Result Area -->
        <div id="resultsArea" class="hidden mt-10 space-y-8 animate-pulse-once">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-panel p-6 rounded-2xl border border-slate-800">
                    <h3 id="labelL" class="neon-text-blue text-sm font-bold mb-4 uppercase">Matrix L</h3>
                    <div id="resultL" class="overflow-x-auto flex justify-center text-lg py-4"></div>
                </div>
                <div class="glass-panel p-6 rounded-2xl border border-slate-800">
                    <h3 id="labelU" class="neon-text-purple text-sm font-bold mb-4 uppercase">Matrix U</h3>
                    <div id="resultU" class="overflow-x-auto flex justify-center text-lg py-4"></div>
                </div>
            </div>

            <!-- Final Solution Section -->
            <div class="glass-panel p-8 rounded-2xl neon-border bg-slate-900/80">
                <h2 class="text-2xl font-bold text-center neon-text-blue mb-6">SOLUCIÓN FINAL (X)</h2>
                <div class="max-w-md mx-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-700">
                                <th class="py-3 px-4 text-xs uppercase text-slate-400">Incógnita</th>
                                <th class="py-3 px-4 text-xs uppercase text-slate-400">Resultado Final</th>
                            </tr>
                        </thead>
                        <tbody id="solutionTableBody" class="font-mono">
                            <!-- JS Generated Rows -->
                        </tbody>
                    </table>
                </div>
                <div class="mt-6 text-center text-xs text-slate-500 italic">
                    Calculado resolviendo $Ly = b$ y luego $Ux = y$
                </div>
            </div>
        </div>
    </div>

    <script>
        function generateMatrixInput() {
            const size = parseInt(document.getElementById('matrixSize').value);
            const mContainer = document.getElementById('matrixContainer');
            const vContainer = document.getElementById('vectorContainer');
            
            mContainer.innerHTML = '';
            vContainer.innerHTML = '';
            
            for (let i = 0; i < size; i++) {
                const mRow = document.createElement('div');
                mRow.className = 'flex space-x-2';
                for (let j = 0; j < size; j++) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.step = 'any';
                    input.className = 'matrix-input';
                    input.id = `m_${i}_${j}`;
                    input.value = (i === j) ? (i + 5) : 1; 
                    mRow.appendChild(input);
                }
                mContainer.appendChild(mRow);

                const vInput = document.createElement('input');
                vInput.type = 'number';
                vInput.className = 'vector-input';
                vInput.id = `v_${i}`;
                vInput.value = (i + 1) * 10;
                vContainer.appendChild(vInput);
            }
            document.getElementById('resultsArea').classList.add('hidden');
        }

        function getInputs() {
            const size = parseInt(document.getElementById('matrixSize').value);
            let A = [];
            let B = [];
            for (let i = 0; i < size; i++) {
                A[i] = [];
                for (let j = 0; j < size; j++) {
                    const val = parseFloat(document.getElementById(`m_${i}_${j}`).value);
                    if (isNaN(val)) return null;
                    A[i][j] = val;
                }
                const bVal = parseFloat(document.getElementById(`v_${i}`).value);
                if (isNaN(bVal)) return null;
                B[i] = bVal;
            }
            return { A, B, size };
        }

        function solveSystem(L, U, B, size) {
            // Ly = B (Forward substitution)
            let y = new Array(size).fill(0);
            for (let i = 0; i < size; i++) {
                let sum = 0;
                for (let j = 0; j < i; j++) sum += L[i][j] * y[j];
                y[i] = (B[i] - sum) / L[i][i];
            }

            // Ux = y (Backward substitution)
            let x = new Array(size).fill(0);
            for (let i = size - 1; i >= 0; i--) {
                let sum = 0;
                for (let j = i + 1; j < size; j++) sum += U[i][j] * x[j];
                x[i] = (y[i] - sum) / U[i][i];
            }
            return x;
        }

        // Algoritmos (Doolittle, Crout, Cholesky actualizados)
        function factorize(method, A, size) {
            let L = Array.from({ length: size }, () => Array(size).fill(0));
            let U = Array.from({ length: size }, () => Array(size).fill(0));

            if (method === 'doolittle') {
                for (let i = 0; i < size; i++) {
                    for (let k = i; k < size; k++) {
                        let sum = 0;
                        for (let j = 0; j < i; j++) sum += (L[i][j] * U[j][k]);
                        U[i][k] = A[i][k] - sum;
                    }
                    for (let k = i; k < size; k++) {
                        if (i === k) L[i][i] = 1;
                        else {
                            let sum = 0;
                            for (let j = 0; j < i; j++) sum += (L[k][j] * U[j][i]);
                            L[k][i] = (A[k][i] - sum) / U[i][i];
                        }
                    }
                }
            } else if (method === 'crout') {
                for (let j = 0; j < size; j++) {
                    U[j][j] = 1;
                    for (let i = j; i < size; i++) {
                        let sum = 0;
                        for (let k = 0; k < j; k++) sum += L[i][k] * U[k][j];
                        L[i][j] = A[i][j] - sum;
                    }
                    for (let i = j + 1; i < size; i++) {
                        let sum = 0;
                        for (let k = 0; k < j; k++) sum += L[j][k] * U[k][i];
                        U[j][i] = (A[j][i] - sum) / L[j][j];
                    }
                }
            } else if (method === 'cholesky') {
                for (let i = 0; i < size; i++) {
                    for (let j = 0; j <= i; j++) {
                        let sum = 0;
                        for (let k = 0; k < j; k++) sum += L[i][k] * L[j][k];
                        if (i === j) {
                            L[i][j] = Math.sqrt(A[i][i] - sum);
                        } else {
                            L[i][j] = (A[i][j] - sum) / L[j][j];
                        }
                    }
                }
                for (let i = 0; i < size; i++)
                    for (let j = 0; j < size; j++) U[i][j] = L[j][i];
            }
            return { L, U };
        }

        function calculate() {
            const data = getInputs();
            if (!data) {
                document.getElementById('messageBox').innerText = "ERROR: Complete todos los campos.";
                document.getElementById('messageBox').classList.remove('hidden');
                return;
            }
            document.getElementById('messageBox').classList.add('hidden');

            try {
                const method = document.getElementById('method').value;
                const { L, U } = factorize(method, data.A, data.size);
                const X = solveSystem(L, U, data.B, data.size);

                // Render matrices
                document.getElementById('resultL').innerHTML = `$$ L = ${formatLatex(L)} $$`;
                document.getElementById('resultU').innerHTML = `$$ U = ${formatLatex(U)} $$`;

                // Render Solution Table
                const tableBody = document.getElementById('solutionTableBody');
                tableBody.innerHTML = '';
                X.forEach((val, index) => {
                    const row = document.createElement('tr');
                    row.className = 'border-b border-slate-800 hover:bg-slate-800/50 transition';
                    row.innerHTML = `
                        <td class="py-4 px-4 neon-text-purple font-bold">x${index + 1}</td>
                        <td class="py-4 px-4 neon-text-blue">${val.toFixed(4)}</td>
                    `;
                    tableBody.appendChild(row);
                });

                document.getElementById('resultsArea').classList.remove('hidden');
                if (window.MathJax) MathJax.Hub.Queue(["Typeset", MathJax.Hub, "resultsArea"]);

            } catch (e) {
                document.getElementById('messageBox').innerText = "ERROR MATEMÁTICO: " + e.message;
                document.getElementById('messageBox').classList.remove('hidden');
            }
        }

        function formatLatex(m) {
            return '\\begin{pmatrix}' + m.map(r => r.map(v => v.toFixed(2)).join(' & ')).join(' \\\\ ') + '\\end{pmatrix}';
        }

        function clearMatrix() { generateMatrixInput(); }

        window.onload = generateMatrixInput;
    </script>
</body>
</html>
